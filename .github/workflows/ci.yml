name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version sync
        run: ./scripts/check-version-sync.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            sidecar/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('sidecar/**/*.gradle.kts', 'sidecar/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Check extension formatting
        run: cargo fmt --check

      - name: Extension clippy
        run: cargo clippy -- -D warnings

      - name: Build extension
        run: cargo build

      - name: Check server formatting
        run: cargo fmt --check --manifest-path server/Cargo.toml

      - name: Server clippy
        run: cargo clippy --manifest-path server/Cargo.toml -- -D warnings
        continue-on-error: true

      - name: Build server
        run: cargo build --manifest-path server/Cargo.toml

      - name: Run server tests
        run: cargo test --manifest-path server/Cargo.toml

      - name: Build sidecar runtime payloads
        run: cd sidecar && ./gradlew assembleRuntimePayloads

      - name: Run sidecar tests
        run: cd sidecar && ./gradlew test

      - name: Verify generated runtime manifest versions
        run: ./scripts/check-version-sync.sh --include-generated-runtime-manifests
